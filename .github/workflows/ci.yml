name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        opt: [O0, O1, O2, O3, Os, Ofast]
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc binutils

      - name: Compile and run exhaustive correctness test (RM(1,7))
        run: |
          gcc -${{ matrix.opt }} -Wall -Wextra -o /tmp/permnet_rm17 source/permnet_rm17.c
          /tmp/permnet_rm17

      - name: Compile and run exhaustive correctness test (RM(1,8))
        run: |
          gcc -${{ matrix.opt }} -Wall -Wextra -o /tmp/permnet_rm18 source/permnet_rm18.c
          /tmp/permnet_rm18

      - name: Compile and run stage-reordered variant correctness test
        run: |
          gcc -${{ matrix.opt }} -Wall -Wextra -o /tmp/permnet_rm17_sr \
              source/permnet_rm17_stage_reordered.c
          /tmp/permnet_rm17_sr

      - name: Compile and run masked d=1 exhaustive correctness test
        run: |
          gcc -${{ matrix.opt }} -Wall -Wextra -o /tmp/permnet_rm17_masked \
              source/permnet_rm17_masked_d1.c
          /tmp/permnet_rm17_masked

      - name: Compile and run shared-output masked d=1 exhaustive test
        run: |
          gcc -${{ matrix.opt }} -Wall -Wextra -o /tmp/permnet_rm17_masked_shared \
              source/permnet_rm17_masked_d1_shared_output.c
          /tmp/permnet_rm17_masked_shared

      - name: Disassembly check -- RM(1,7) must be free of conditional jumps
        run: |
          # -fno-stack-protector: Ubuntu gcc defaults enable
          # -fstack-protector-strong, which wraps any function that has a
          # local array with a canary check ending in `je __stack_chk_fail`.
          # That `je` is canary-vs-TLS, not message-dependent, but the
          # grep below would catch it. We disable the wrapper for the
          # disassembly-check build only; the correctness-test builds
          # above keep the default hardening.
          gcc -${{ matrix.opt }} -fno-stack-protector \
              -c source/permnet_rm17.c -o /tmp/rm17.o
          # Extract only the encoder body (from its label to the next blank line).
          objdump -d /tmp/rm17.o \
            | awk '/<reed_muller_encode_permnet>:/{flag=1} flag{print} flag && /^$/{exit}' \
            > /tmp/rm17_${{ matrix.opt }}.asm
          echo "--- Disassembly (RM(1,7), -${{ matrix.opt }}) ---"
          cat /tmp/rm17_${{ matrix.opt }}.asm
          if [ ! -s /tmp/rm17_${{ matrix.opt }}.asm ]; then
            echo "FAIL: could not locate reed_muller_encode_permnet in disassembly"
            exit 1
          fi
          # Conditional x86-64 jumps. jmp (unconditional) is allowed.
          COND_JUMPS='\b(je|jne|jg|jge|jl|jle|ja|jae|jb|jbe|jc|jnc|jz|jnz|js|jns|jo|jno|jp|jnp|jcxz|jecxz|jrcxz|jpe|jpo|loop|loope|loopne|loopz|loopnz)\b'
          if grep -wE "$COND_JUMPS" /tmp/rm17_${{ matrix.opt }}.asm; then
            echo "FAIL: conditional jump found in RM(1,7) encoder at -${{ matrix.opt }}"
            exit 1
          fi
          echo "OK: no conditional jumps in RM(1,7) encoder at -${{ matrix.opt }}"
          # Informational: count BIT0MASK-equivalent neg instructions.
          # These are expected on the unmasked encoder for m7 (x86-64 `lo`
          # half is mixed, so only `high` reduces to `-m7`). Do not fail
          # the build on `neg`; LIMITATIONS.md documents the residual.
          NEG_COUNT=$(grep -cE '\bneg[qlwb]?\b' /tmp/rm17_${{ matrix.opt }}.asm || true)
          echo "INFO: ${NEG_COUNT} neg instruction(s) in RM(1,7) encoder at -${{ matrix.opt }}"

      - name: Disassembly check -- RM(1,8) must be free of conditional jumps
        run: |
          gcc -${{ matrix.opt }} -fno-stack-protector \
              -c source/permnet_rm18.c -o /tmp/rm18.o
          objdump -d /tmp/rm18.o \
            | awk '/<reed_muller_encode_permnet_rm18>:/{flag=1} flag{print} flag && /^$/{exit}' \
            > /tmp/rm18_${{ matrix.opt }}.asm
          echo "--- Disassembly (RM(1,8), -${{ matrix.opt }}) ---"
          cat /tmp/rm18_${{ matrix.opt }}.asm
          if [ ! -s /tmp/rm18_${{ matrix.opt }}.asm ]; then
            echo "FAIL: could not locate reed_muller_encode_permnet_rm18 in disassembly"
            exit 1
          fi
          COND_JUMPS='\b(je|jne|jg|jge|jl|jle|ja|jae|jb|jbe|jc|jnc|jz|jnz|js|jns|jo|jno|jp|jnp|jcxz|jecxz|jrcxz|jpe|jpo|loop|loope|loopne|loopz|loopnz)\b'
          if grep -wE "$COND_JUMPS" /tmp/rm18_${{ matrix.opt }}.asm; then
            echo "FAIL: conditional jump found in RM(1,8) encoder at -${{ matrix.opt }}"
            exit 1
          fi
          echo "OK: no conditional jumps in RM(1,8) encoder at -${{ matrix.opt }}"

      - name: Disassembly check -- masked d=1 variant must be free of conditional jumps
        run: |
          gcc -${{ matrix.opt }} -fno-stack-protector \
              -c source/permnet_rm17_masked_d1.c -o /tmp/masked.o
          objdump -d /tmp/masked.o \
            | awk '/<reed_muller_encode_permnet_masked_d1>:/{flag=1} flag{print} flag && /^$/{exit}' \
            > /tmp/masked_${{ matrix.opt }}.asm
          echo "--- Disassembly (masked d=1, -${{ matrix.opt }}) ---"
          cat /tmp/masked_${{ matrix.opt }}.asm
          if [ ! -s /tmp/masked_${{ matrix.opt }}.asm ]; then
            echo "FAIL: could not locate reed_muller_encode_permnet_masked_d1 in disassembly"
            exit 1
          fi
          COND_JUMPS='\b(je|jne|jg|jge|jl|jle|ja|jae|jb|jbe|jc|jnc|jz|jnz|js|jns|jo|jno|jp|jnp|jcxz|jecxz|jrcxz|jpe|jpo|loop|loope|loopne|loopz|loopnz)\b'
          if grep -wE "$COND_JUMPS" /tmp/masked_${{ matrix.opt }}.asm; then
            echo "FAIL: conditional jump found in masked d=1 encoder at -${{ matrix.opt }}"
            exit 1
          fi
          echo "OK: no conditional jumps in masked d=1 encoder at -${{ matrix.opt }}"

      - name: Disassembly check -- shared-output masked d=1 variant must be free of conditional jumps
        run: |
          gcc -${{ matrix.opt }} -fno-stack-protector \
              -c source/permnet_rm17_masked_d1_shared_output.c -o /tmp/masked_shared.o
          objdump -d /tmp/masked_shared.o \
            | awk '/<reed_muller_encode_permnet_masked_d1_shared_output>:/{flag=1} flag{print} flag && /^$/{exit}' \
            > /tmp/masked_shared_${{ matrix.opt }}.asm
          echo "--- Disassembly (masked d=1 shared-output, -${{ matrix.opt }}) ---"
          cat /tmp/masked_shared_${{ matrix.opt }}.asm
          if [ ! -s /tmp/masked_shared_${{ matrix.opt }}.asm ]; then
            echo "FAIL: could not locate reed_muller_encode_permnet_masked_d1_shared_output in disassembly"
            exit 1
          fi
          COND_JUMPS='\b(je|jne|jg|jge|jl|jle|ja|jae|jb|jbe|jc|jnc|jz|jnz|js|jns|jo|jno|jp|jnp|jcxz|jecxz|jrcxz|jpe|jpo|loop|loope|loopne|loopz|loopnz)\b'
          if grep -wE "$COND_JUMPS" /tmp/masked_shared_${{ matrix.opt }}.asm; then
            echo "FAIL: conditional jump found in shared-output masked d=1 encoder at -${{ matrix.opt }}"
            exit 1
          fi
          echo "OK: no conditional jumps in shared-output masked d=1 encoder at -${{ matrix.opt }}"
          NEG_COUNT=$(grep -cE '\bneg[qlwb]?\b' /tmp/masked_shared_${{ matrix.opt }}.asm || true)
          echo "INFO: ${NEG_COUNT} neg instruction(s) in shared-output masked d=1 encoder at -${{ matrix.opt }} (should be 0 on well-mixed shares)"

      - name: Disassembly check -- stage-reordered variant must be free of conditional jumps
        run: |
          gcc -${{ matrix.opt }} -fno-stack-protector \
              -c source/permnet_rm17_stage_reordered.c -o /tmp/sr.o
          objdump -d /tmp/sr.o \
            | awk '/<reed_muller_encode_permnet_stage_reordered>:/{flag=1} flag{print} flag && /^$/{exit}' \
            > /tmp/sr_${{ matrix.opt }}.asm
          echo "--- Disassembly (stage-reordered, -${{ matrix.opt }}) ---"
          cat /tmp/sr_${{ matrix.opt }}.asm
          if [ ! -s /tmp/sr_${{ matrix.opt }}.asm ]; then
            echo "FAIL: could not locate reed_muller_encode_permnet_stage_reordered in disassembly"
            exit 1
          fi
          COND_JUMPS='\b(je|jne|jg|jge|jl|jle|ja|jae|jb|jbe|jc|jnc|jz|jnz|js|jns|jo|jno|jp|jnp|jcxz|jecxz|jrcxz|jpe|jpo|loop|loope|loopne|loopz|loopnz)\b'
          if grep -wE "$COND_JUMPS" /tmp/sr_${{ matrix.opt }}.asm; then
            echo "FAIL: conditional jump found in stage-reordered encoder at -${{ matrix.opt }}"
            exit 1
          fi
          echo "OK: no conditional jumps in stage-reordered encoder at -${{ matrix.opt }}"

      - name: Upload disassembly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: disassembly-${{ matrix.opt }}
          path: |
            /tmp/rm*_${{ matrix.opt }}.asm
            /tmp/sr_${{ matrix.opt }}.asm
            /tmp/masked_${{ matrix.opt }}.asm
            /tmp/masked_shared_${{ matrix.opt }}.asm
